name: Deploy

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      # Deploy Worker (production only)
      - name: Deploy Worker
        if: github.ref == 'refs/heads/main'
        working-directory: apps/worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Build Web
      - name: Build Web
        working-directory: apps/web
        run: npm run build
        env:
          NEXT_PUBLIC_WORKER_URL: ${{ vars.WORKER_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}

      # Deploy to Cloudflare Pages (production)
      - name: Deploy Pages (production)
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy apps/web/out --project-name minhaya-web --branch main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # Deploy to Cloudflare Pages (staging preview)
      - name: Deploy Pages (staging)
        if: github.ref == 'refs/heads/develop'
        run: npx wrangler pages deploy apps/web/out --project-name minhaya-web --branch develop
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
